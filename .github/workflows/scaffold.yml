name: RAG Live Scaffold CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-pytest:
    name: Backend Test with pytest
    runs-on: ubuntu-latest
    env:
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      CHUNK_SIZE: ${{ vars.CHUNK_SIZE }}
      CHUNK_OVERLAP: ${{ vars.CHUNK_OVERLAP }}
      NUM_RETRIEVED_DOCS: ${{ vars.NUM_RETRIEVED_DOCS }}
      MAX_QUESTION_CHARS: ${{ vars.MAX_QUESTION_CHARS }}
      MAX_FILE_SIZE_MB: ${{ vars.MAX_FILE_SIZE_MB }}
      RATE_LIMIT_WINDOW_SECONDS: ${{ vars.RATE_LIMIT_WINDOW_SECONDS }}
      RATE_LIMIT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_MAX_REQUESTS }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      HUGGINGFACE_TEST_API_KEY: ${{ secrets.HUGGINGFACE_TEST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate required backend env vars
        run: |
          missing=0
          for key in CORS_ALLOWED_ORIGINS EMBEDDING_MODEL LLM_MODEL CHUNK_SIZE CHUNK_OVERLAP NUM_RETRIEVED_DOCS MAX_QUESTION_CHARS MAX_FILE_SIZE_MB RATE_LIMIT_WINDOW_SECONDS RATE_LIMIT_MAX_REQUESTS HUGGINGFACE_TEST_API_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required env: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest app/test_main.py -q

  frontend-dev-check:
    name: Frontend Dev Server Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: front
        run: yarn install --immutable

      - name: Run yarn dev and verify server
        working-directory: front
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_MAX_FILE_SIZE_MB: ${{ vars.VITE_MAX_FILE_SIZE_MB }}
        run: |
          if [ -z "$VITE_API_URL" ] || [ -z "$VITE_MAX_FILE_SIZE_MB" ]; then
            echo "Missing required frontend vars: VITE_API_URL and/or VITE_MAX_FILE_SIZE_MB"
            exit 1
          fi

          yarn build
